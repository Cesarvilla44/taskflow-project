<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Task Manager</h1>
</header>

<main>

    <aside class="sidebar">
        <h2>Categorías</h2>
        <ul>
            <li>Trabajo</li>
            <li>Estudio</li>
            <li>Personal</li>
        </ul>
    </aside>

    <section class="tasks">

        
        <form id="task-form">
            <input type="text" id="task-input" placeholder="Nueva tarea..." required>
            <button type="submit">Añadir</button>
        </form>

        
        <input type="text" id="search-input" placeholder="Buscar tareas...">
        <div id="tasks-container">
        </div>

    </section>

</main>

<script src="app.js"></script>
</body>
</html>
