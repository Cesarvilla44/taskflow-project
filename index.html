<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Task Manager</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-500 min-h-screen">

    <header class="p-5 flex justify-between items-center border-b bg-white dark:bg-slate-800 dark:border-slate-700 shadow-sm">
        <h1 class="text-3xl font-extrabold text-blue-600 dark:text-blue-400">Flujo de Tareas</h1>
        
        <button id="theme-toggle" class="px-5 py-2 rounded-full bg-slate-800 text-white dark:bg-white dark:text-slate-900 font-bold shadow-md hover:scale-105 transition-all active:scale-95">
            Modo Oscuro
        </button>
    </header>

    <main class="flex">
        <aside class="w-64 min-h-screen p-6 border-r bg-slate-50 dark:bg-slate-800 dark:border-slate-700 hidden md:block">
            <h2 class="text-xl font-bold mb-6">Categorías</h2>
            <ul class="space-y-4">
                <li class="flex items-center gap-2 cursor-pointer hover:text-blue-500 transition"><span>📁</span> Trabajo</li>
                <li class="flex items-center gap-2 cursor-pointer hover:text-blue-500 transition"><span>📚</span> Estudio</li>
                <li class="flex items-center gap-2 cursor-pointer hover:text-blue-500 transition"><span>👤</span> Personal</li>
            </ul>
        </aside>

        <section class="flex-1 p-8 max-w-4xl mx-auto">
            
            <form id="task-form" class="mb-10">
                <div class="flex gap-3 bg-slate-100 dark:bg-slate-800 p-2 rounded-xl border dark:border-slate-700 shadow-inner">
                    <input type="text" id="task-input" placeholder="¿Qué hay que hacer hoy?" required 
                           class="flex-1 p-3 bg-transparent focus:outline-none dark:text-white">
                    <button type="submit" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold transition-all shadow-lg shadow-blue-500/30">
                        Añadir
                    </button>
                </div>
            </form>

            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Buscar tareas..." 
                           class="w-full p-4 rounded-xl border bg-white dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                
                <div id="tasks-container" class="space-y-3">
                    <div class="p-4 border rounded-lg dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-400 italic">
                        No hay tareas por ahora.
                    </div>
                </div>
            </div>
        </section>
    </main>
<script src="app.js"></script>

    <script>
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        if (btn) {
            btn.addEventListener('click', () => {
                
                html.classList.toggle('dark');
                
                
                if (html.classList.contains('dark')) {
                    btn.innerText = 'Modo Claro';
                } else {
                    btn.innerText = 'Modo Oscuro';
                }
            });
        }
    </script>
</body>
</html>
