<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Task Manager</h1>
</header>

<main>

    <aside class="sidebar">
        <h2>Categorías</h2>
        <ul>
            <li>Trabajo</li>
            <li>Estudio</li>
            <li>Personal</li>
        </ul>
    </aside>

    <section class="tasks">

        <div class="task-card high">
            <span class="task-title">Terminar proyecto</span>
            <span class="category">Trabajo</span>
            <span class="priority">Alta</span>
        </div>

        <div class="task-card medium">
            <span class="task-title">Estudiar HTML</span>
            <span class="category">Estudio</span>
            <span class="priority">Media</span>
        </div>

        <div class="task-card low">
            <span class="task-title">Ir al gimnasio</span>
            <span class="category">Personal</span>
            <span class="priority">Baja</span>
        </div>

    </section>

</main>

</body>
</html>
